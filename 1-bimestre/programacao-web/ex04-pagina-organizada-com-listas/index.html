<!DOCTYPE html>
<html>
<head>
    <title>Página com listas</title>
</head>
<body>

    <div>

        <h1>Minha Página</h1>

        <p>Este é um parágrafo com um <span>trecho destacado</span> dentro dele.</p>

        <hr>

        <h2>Lista não ordenada</h2>
        <ul>
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
        </ul>

        <h2>Lista ordenada</h2>
        <ol>
            <li>Primeiro</li>
            <li>Segundo</li>
            <li>Terceiro</li>
        </ol>

    </div>

</body>
</html>
